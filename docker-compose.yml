services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spg}
      POSTGRES_DB: ${POSTGRES_DB:-spg}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://spg:spg@db:5432/spg}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - bot

volumes:
  pgdata:
